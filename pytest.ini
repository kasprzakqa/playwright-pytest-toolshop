[pytest]
pythonpath = .
addopts = --strict-markers -ra
markers =
    smoke: build-alive critical path, CI deploy gate (pytest -m smoke)
    regression: full regression coverage
    sanity: shallow low-risk checks
    api: API-layer test (plain assert on JSON allowed)
    a11y: accessibility test (axe scan + keyboard/focus)
    flaky_quarantine: known-flaky, runs in a non-blocking CI job
