name: Nightly regression

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  cross-browser:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('requirements.txt') }}
      - run: python -m playwright install --with-deps ${{ matrix.browser }}
      - name: Full regression on ${{ matrix.browser }}
        run: >
          pytest -n auto --reruns 1 --reruns-delay 3
          --browser ${{ matrix.browser }}
          --html=report-${{ matrix.browser }}.html --self-contained-html
          --tracing=retain-on-failure
          --screenshot=only-on-failure
          --output=test-results-${{ matrix.browser }}
      - name: Upload ${{ matrix.browser }} report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.browser }}
          path: |
            report-${{ matrix.browser }}.html
            test-results-${{ matrix.browser }}/
          retention-days: 14
